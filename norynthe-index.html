<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norynthe</title>
  <meta name="description" content="Norynthe — independent standards, clear signal, trusted intelligence." />
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #5a5a5a;
      --dot: #111111;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    main {
      width: 100%;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .lockup {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.18em;
      line-height: 1;
      user-select: none;
    }

    .wordmark {
      font-size: clamp(3.6rem, 10vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      margin: 0;
    }

    .dot {
      width: clamp(0.5rem, 1.1vw, 0.85rem);
      height: clamp(0.5rem, 1.1vw, 0.85rem);
      border-radius: 999px;
      background: var(--dot);
      margin-bottom: 0.13em;
      animation: blink 1.2s steps(1, end) infinite;
      transform: translateY(-0.02em);
    }

    .tagline {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0.14; }
    }

    @media (max-width: 640px) {
      .tagline {
        white-space: normal;
        width: min(90vw, 28rem);
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>
  <main>
    <section aria-label="Norynthe landing page">
      <div class="lockup" role="img" aria-label="Norynthe wordmark with blinking signal dot">
        <h1 class="wordmark">Norynthe</h1>
        <span class="dot" aria-hidden="true"></span>
      </div>
    </section>
  </main>

  <p class="tagline">Independent Standards · Clear Signal · Trusted Intelligence</p>
</body>
</html>
