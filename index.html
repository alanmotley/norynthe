<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Norynthe.</title>
  <meta name="description" content="Norynthe. — independent standards for trusted intelligence.">
  <meta name="theme-color" content="#E9EDF2">
  <link rel="canonical" href="https://www.norynthe.com/">

  <meta property="og:title" content="Norynthe.">
  <meta property="og:description" content="Independent standards for trusted intelligence.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.norynthe.com/">
  <meta property="og:image" content="https://www.norynthe.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Norynthe social preview">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Norynthe.">
  <meta name="twitter:description" content="Independent standards for trusted intelligence.">
  <meta name="twitter:image" content="https://www.norynthe.com/og-image.png">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <style>
    :root {
      --bg: #E9EDF2;
      --text: #111111;
      --muted: #5f6368;
      --dot: #7A3030;
      --logo-width: min(76vw, 760px);
      --dot-size: clamp(14px, 1.5vw, 20px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 72% 18%, rgba(143, 177, 203, 0.16), transparent 30%),
        radial-gradient(circle at 24% 86%, rgba(184, 167, 106, 0.08), transparent 26%),
        linear-gradient(180deg, #EEF2F5 0%, #E9EDF2 48%, #EFF3F6 100%);
    }

    main {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      bottom: calc(50% - 150px);
      width: min(72vw, 760px);
      height: 180px;
      background: radial-gradient(ellipse at center, rgba(15, 17, 21, 0.08), rgba(15, 17, 21, 0) 68%);
      filter: blur(26px);
      pointer-events: none;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      line-height: 1;
      user-select: none;
      position: relative;
    }
    .brand-lockup::before {
      content: "";
      position: absolute;
      inset: auto auto -26px 50%;
      width: min(48vw, 420px);
      height: 24px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(15, 17, 21, 0.09), rgba(15, 17, 21, 0) 72%);
      filter: blur(12px);
      pointer-events: none;
    }

    .logo-shell {
      position: relative;
      display: inline-block;
      line-height: 0;
      isolation: isolate;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
    }

    .logo {
      position: relative;
      z-index: 2;
      display: block;
      width: var(--logo-width);
      max-width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 14px 22px rgba(15, 17, 21, 0.06));
    }

    .logo-fallback {
      display: none;
      margin: 0;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      color: var(--text);
      line-height: 0.94;
    }

    .dot {
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 999px;
      background: var(--dot);
      flex: 0 0 auto;
      animation: blink 1.2s steps(1, end) infinite;
    }

    .dot-overlay {
      position: absolute;
      right: clamp(34px, 3.6vw, 54px);
      bottom: clamp(38px, 4vw, 60px);
      pointer-events: none;
      z-index: 5;
      background: var(--bg);
      box-shadow: 0 0 0 4px rgba(233, 237, 242, 0.96);
    }

    .subline {
      margin: 1.4rem 0 0;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      position: relative;
      z-index: 2;
      padding-inline: 1.2rem;
    }

    .tagline {
      position: fixed;
      bottom: 2.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
      padding-top: 1rem;
    }
    .tagline::before {
      content: "";
      display: block;
      width: min(22vw, 180px);
      height: 1px;
      margin: 0 auto 1rem;
      background: linear-gradient(90deg, transparent, rgba(122, 48, 48, 0.18), transparent);
    }

    .tagline a {
      color: inherit;
      text-decoration: none;
    }

    .tagline a:hover {
      text-decoration: underline;
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0.18; }
    }

    @media (max-width: 900px) {
      :root {
        --logo-width: min(84vw, 640px);
      }
    }

    @media (max-width: 640px) {
      :root {
        --logo-width: min(88vw, 520px);
        --dot-size: clamp(9px, 2vw, 12px);
      }

      .hero::after {
        display: none;
      }

      .brand-lockup::before {
        width: min(56vw, 260px);
        bottom: -18px;
      }

      .subline {
        width: min(90vw, 28rem);
        line-height: 1.5;
        padding-inline: 1rem;
      }

      .tagline {
        white-space: normal;
        width: min(90vw, 28rem);
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Norynthe landing page">
      <div class="brand-lockup" role="img" aria-label="Norynthe logo with blinking signal dot">
        <div class="logo-shell">
          <div class="logo-wrap">
            <img
              class="logo"
              src="norynthe-logo.png"
              alt="Norynthe"
              onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block';"
            >
            <h1 class="logo-fallback">Norynthe.</h1>
          </div>
          <span class="dot dot-overlay" aria-hidden="true"></span>
        </div>
      </div>
      <p class="subline">Independent standards for trusted intelligence.</p>
    </section>
  </main>

  <p class="tagline"><a href="mailto:hello@norynthe.com">hello@norynthe.com</a> · © 2026 Norynthe.</p>
</body>
</html>
