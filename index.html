<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norynthe</title>
  <meta name="description" content="Norynthe — independent standards, clear signal, trusted intelligence." />
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #5f6368;
      --dot: #111111;
      --logo-width: min(76vw, 760px);
      --dot-size: clamp(14.24px, 1.49vw, 19.92px);
      --dot-gap: clamp(4px, 0.45vw, 8px);
      --dot-lift: clamp(10px, 1vw, 18px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    main {
      width: 100%;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .hero {
      display: grid;
      place-items: center;
      width: 100%;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      line-height: 1;
      user-select: none;
    }

    .logo-shell {
      position: relative;
      display: inline-block;
      line-height: 0;
      isolation: isolate;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
    }

    .logo {
      display: block;
      width: var(--logo-width);
      height: auto;
      max-width: 100%;
      object-fit: contain;
      position: relative;
      z-index: 1;
    }

    .logo-fallback {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      margin: 0;
      color: var(--text);
      display: none;
    }

    .dot {
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 999px;
      background: var(--dot);
      flex: 0 0 auto;
      animation: blink 1.2s steps(1, end) infinite;
    }

    .dot-overlay {
      position: absolute;
      right: clamp(34px, 3.6vw, 54px);
      bottom: clamp(38px, 4vw, 60px);
      margin: 0;
      pointer-events: none;
      z-index: 5;
      background: var(--bg);
      mix-blend-mode: normal;
      box-shadow: 0 0 0 1px var(--bg);
      opacity: 1;
    }

    .tagline {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }
      49%, 100% { opacity: 0.14; }
    }

    @media (max-width: 900px) {
      :root {
        --logo-width: min(84vw, 640px);
        --dot-lift: clamp(8px, 0.9vw, 14px);
      }
    }

    @media (max-width: 640px) {
      :root {
        --logo-width: min(88vw, 520px);
        --dot-size: clamp(9px, 2vw, 12px);
        --dot-gap: 4px;
        --dot-lift: clamp(6px, 1.5vw, 10px);
      }

      .tagline {
        white-space: normal;
        width: min(90vw, 28rem);
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Norynthe landing page">
      <div class="brand-lockup" role="img" aria-label="Norynthe logo with blinking signal dot">
        <div class="logo-shell">
          <div class="logo-wrap">
            <img
              class="logo"
              src="norynthe-logo.png"
              alt="Norynthe"
              onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block';"
            />
            <h1 class="logo-fallback">Norynthe</h1>
          </div>
          <span class="dot dot-overlay" aria-hidden="true"></span>
        </div>
      </div>
    </section>
  </main>

  <p class="tagline">Independent Standards · Clear Signal · Trusted Intelligence</p>
</body>
</html>
