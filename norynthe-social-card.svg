<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Norynthe Social Card</title>
  <desc id="desc">Centered Norynthe logo on a pale atmospheric background for social sharing.</desc>
  <defs>
    <radialGradient id="glowA" cx="78%" cy="18%" r="38%">
      <stop offset="0%" stop-color="rgba(143,177,203,0.22)"/>
      <stop offset="100%" stop-color="rgba(143,177,203,0)"/>
    </radialGradient>
    <radialGradient id="glowB" cx="20%" cy="82%" r="34%">
      <stop offset="0%" stop-color="rgba(184,167,106,0.16)"/>
      <stop offset="100%" stop-color="rgba(184,167,106,0)"/>
    </radialGradient>
    <radialGradient id="glowC" cx="50%" cy="46%" r="28%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.62)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF3F6"/>
      <stop offset="52%" stop-color="#E9EDF2"/>
      <stop offset="100%" stop-color="#EEF2F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F1115" flood-opacity="0.08"/>
    </filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="rgba(15,17,21,0.018)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.82"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect width="1200" height="630" fill="url(#glowC)"/>

  <g filter="url(#shadow)">
    <image
      href="https://www.norynthe.com/norynthe-logo.png"
      x="210"
      y="205"
      width="780"
      height="220"
      preserveAspectRatio="xMidYMid meet"
    />
  </g>

  <text
    x="600"
    y="475"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    letter-spacing="4.8"
    fill="#5C6772"
  >INDEPENDENT TRUST INFRASTRUCTURE FOR AI</text>
</svg>
